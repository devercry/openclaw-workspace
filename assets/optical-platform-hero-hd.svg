<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    
    <!-- Metal gradient for stage -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eaed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c5c8cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a5ac;stop-opacity:1" />
    </linearGradient>
    
    <!-- Optics gradient -->
    <linearGradient id="opticGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Laser glow -->
    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Floor reflection -->
  <ellipse cx="960" cy="900" rx="600" ry="60" fill="#d1d5db" opacity="0.3"/>
  
  <!-- Main optical table base -->
  <rect x="360" y="600" width="1200" height="180" rx="12" fill="url(#metalGrad)" filter="url(#shadow)"/>
  
  <!-- Honeycomb pattern on table (simplified) -->
  <g opacity="0.15">
    <path d="M400 620 L440 620 L460 655 L440 690 L400 690 L380 655 Z" fill="none" stroke="#5a6069" stroke-width="1"/>
    <path d="M460 620 L500 620 L520 655 L500 690 L460 690 L440 655 Z" fill="none" stroke="#5a6069" stroke-width="1"/>
    <path d="M520 620 L560 620 L580 655 L560 690 L520 690 L500 655 Z" fill="none" stroke="#5a6069" stroke-width="1"/>
  </g>
  
  <!-- Linear stage rail -->
  <rect x="480" y="560" width="960" height="40" rx="8" fill="#7a8089" filter="url(#shadow)"/>
  
  <!-- Moving stage platform -->
  <rect x="720" y="500" width="480" height="60" rx="8" fill="url(#metalGrad)" filter="url(#shadow)"/>
  
  <!-- Motor housing left -->
  <rect x="420" y="540" width="120" height="60" rx="8" fill="#5a6069"/>
  <circle cx="480" cy="570" r="25" fill="#4a5059"/>
  <circle cx="480" cy="570" r="12" fill="#3a4049"/>
  
  <!-- Control box right -->
  <rect x="1380" y="520" width="160" height="100" rx="10" fill="#5a6069" filter="url(#shadow)"/>
  <rect x="1400" y="540" width="120" height="60" rx="6" fill="#3a4049"/>
  <!-- LED indicators -->
  <circle cx="1420" cy="570" r="5" fill="#4caf50"/>
  <circle cx="1445" cy="570" r="5" fill="#4caf50"/>
  <circle cx="1470" cy="570" r="5" fill="#ff9800"/>
  <circle cx="1495" cy="570" r="5" fill="#f44336"/>
  
  <!-- Optical mount 1 (left) -->
  <rect x="780" y="440" width="100" height="60" rx="6" fill="#4a5059"/>
  <circle cx="830" cy="420" r="35" fill="url(#opticGrad)"/>
  <circle cx="830" cy="420" r="25" fill="#5a65d9"/>
  <circle cx="830" cy="420" r="15" fill="#667eea"/>
  <circle cx="830" cy="420" r="6" fill="#ffffff" opacity="0.6"/>
  
  <!-- Optical mount 2 (right) -->
  <rect x="1040" y="440" width="100" height="60" rx="6" fill="#4a5059"/>
  <circle cx="1090" cy="420" r="35" fill="url(#opticGrad)"/>
  <circle cx="1090" cy="420" r="25" fill="#5a65d9"/>
  <circle cx="1090" cy="420" r="15" fill="#667eea"/>
  <circle cx="1090" cy="420" r="6" fill="#ffffff" opacity="0.6"/>
  
  <!-- Optical mount 3 (center-top) -->
  <rect x="910" y="360" width="100" height="60" rx="6" fill="#4a5059"/>
  <circle cx="960" cy="340" r="35" fill="url(#opticGrad)"/>
  <circle cx="960" cy="340" r="25" fill="#5a65d9"/>
  <circle cx="960" cy="340" r="15" fill="#667eea"/>
  <circle cx="960" cy="340" r="6" fill="#ffffff" opacity="0.6"/>
  
  <!-- Laser beam path -->
  <line x1="865" y1="420" x2="1055" y2="420" stroke="#ff5722" stroke-width="4" opacity="0.8" filter="url(#laserGlow)"/>
  <line x1="960" y1="375" x2="960" y2="420" stroke="#ff5722" stroke-width="4" opacity="0.8" filter="url(#laserGlow)"/>
  
  <!-- Beam dots -->
  <circle cx="960" cy="420" r="5" fill="#ff5722" filter="url(#laserGlow)"/>
  <circle cx="920" cy="420" r="3" fill="#ff5722" opacity="0.6"/>
  <circle cx="1000" cy="420" r="3" fill="#ff5722" opacity="0.6"/>
  
  <!-- Precision scale markings on rail -->
  <g fill="#9aa0a6">
    <rect x="500" y="555" width="2" height="10"/>
    <rect x="550" y="555" width="2" height="10"/>
    <rect x="600" y="555" width="2" height="10"/>
    <rect x="650" y="555" width="2" height="10"/>
    <rect x="700" y="555" width="2" height="10"/>
    <rect x="750" y="555" width="2" height="10"/>
    <rect x="800" y="555" width="2" height="10"/>
    <rect x="850" y="555" width="2" height="10"/>
    <rect x="900" y="555" width="2" height="10"/>
    <rect x="950" y="555" width="2" height="10"/>
    <rect x="1000" y="555" width="2" height="10"/>
    <rect x="1050" y="555" width="2" height="10"/>
    <rect x="1100" y="555" width="2" height="10"/>
    <rect x="1150" y="555" width="2" height="10"/>
    <rect x="1200" y="555" width="2" height="10"/>
    <rect x="1250" y="555" width="2" height="10"/>
    <rect x="1300" y="555" width="2" height="10"/>
    <rect x="1350" y="555" width="2" height="10"/>
    <rect x="1400" y="555" width="2" height="10"/>
  </g>
  
  <!-- Title -->
  <text x="960" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#2a3039">AUTOMATED OPTICAL PLATFORM</text>
  
  <!-- Subtitle -->
  <text x="960" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#5a6069" font-weight="400">Precision Linear Stage System</text>
  
  <!-- Divider line -->
  <line x1="760" y1="260" x2="1160" y2="260" stroke="#bdc1c6" stroke-width="3"/>
  
  <!-- Specs -->
  <g transform="translate(960,980)" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#7a8089">
    <text x="0" y="0">Nano-positioning Accuracy</text>
    <text x="0" y="35">High Stability • Automated Control • Multi-Axis Alignment</text>
  </g>
  
  <!-- Decorative corner elements -->
  <g stroke="#667eea" stroke-width="2" fill="none" opacity="0.4">
    <circle cx="200" cy="200" r="80"/>
    <circle cx="200" cy="200" r="60"/>
    <circle cx="200" cy="200" r="40"/>
    
    <circle cx="1720" cy="880" r="80"/>
    <circle cx="1720" cy="880" r="60"/>
    <circle cx="1720" cy="880" r="40"/>
  </g>
  
  <!-- Technical annotations -->
  <g font-family="monospace" font-size="14" fill="#9aa0a6">
    <text x="420" y="720">X-AXIS: ±50mm</text>
    <text x="1420" y="720">Y-AXIS: ±50mm</text>
    <text x="960" y="320">λ/10 OPTICS</text>
  </g>
</svg>
