<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c3cfe2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stage" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d8dce0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a5ac;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <!-- Base platform -->
  <rect x="200" y="480" width="880" height="120" rx="8" fill="url(#stage)" filter="url(#shadow)"/>
  
  <!-- Linear rail -->
  <rect x="280" y="460" width="720" height="20" rx="4" fill="#7a8089"/>
  
  <!-- Moving stage -->
  <rect x="450" y="400" width="380" height="60" rx="6" fill="#5a6069" filter="url(#shadow)"/>
  
  <!-- Optical mount left -->
  <rect x="500" y="340" width="80" height="60" rx="4" fill="#4a5059"/>
  <circle cx="540" cy="320" r="25" fill="#3a4049"/>
  <circle cx="540" cy="320" r="15" fill="#2a3039"/>
  <circle cx="540" cy="320" r="8" fill="#1a2029"/>
  
  <!-- Optical mount right -->
  <rect x="700" y="340" width="80" height="60" rx="4" fill="#4a5059"/>
  <circle cx="740" cy="320" r="25" fill="#3a4049"/>
  <circle cx="740" cy="320" r="15" fill="#2a3039"/>
  <circle cx="740" cy="320" r="8" fill="#1a2029"/>
  
  <!-- Laser beam -->
  <line x1="565" y1="320" x2="715" y2="320" stroke="#4fc3f7" stroke-width="3" opacity="0.8"/>
  <circle cx="640" cy="320" r="4" fill="#4fc3f7" opacity="0.6"/>
  
  <!-- Motor/actuator -->
  <rect x="320" y="440" width="100" height="40" rx="6" fill="#6a7079"/>
  <circle cx="370" cy="460" r="15" fill="#5a6069"/>
  
  <!-- Control unit -->
  <rect x="900" y="420" width="140" height="80" rx="8" fill="#5a6069" filter="url(#shadow)"/>
  <rect x="920" y="440" width="100" height="40" rx="4" fill="#3a4049"/>
  <circle cx="940" cy="460" r="4" fill="#4caf50"/>
  <circle cx="960" cy="460" r="4" fill="#4caf50"/>
  <circle cx="980" cy="460" r="4" fill="#ff9800"/>
  
  <!-- Title -->
  <text x="640" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#2a3039">AUTOMATED OPTICAL PLATFORM</text>
  
  <!-- Subtitle -->
  <text x="640" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#5a6069" font-weight="400">Precision Linear Stage System</text>
  
  <!-- Decorative elements -->
  <line x1="540" y1="260" x2="740" y2="260" stroke="#bdc1c6" stroke-width="2"/>
  
  <!-- Specs -->
  <text x="640" y="680" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7a8089">Nano-positioning • High Stability • Automated Control</text>
</svg>
